teststeps:

-
  name: 客服工作台-自动应答设置-企业微信-随机内容
  request:
    method: POST
    url: /text/chat-kwb/admin/modifyAdminChannelConfig.action
    data:
      channelType: 9
      adminHelloWord: ${fake.text()}
      serviceOutDoc: #😁 #${fake.text()}
      serviceEndPushMsg: #${fake.text()}
      serviceOutTime: 1
      tid: H1hz6lTjZ2u7SGkPrC88N67X0o6hPSKwPvoa4Nb30rI0hoH5dRpzbtTIrPd3Y5rT
