teststeps:
-
  name: 服务总结-添加
  request:
    method: post
    headers:
      temp-id: ${get_temp_id}
    url: /text/basic-config-service/insertChatUnitInfo/4

    data:
      unitName: ${fake.text(max_nb_chars=100)}
      unitStatus: 1
  extract:
    get_unitId: $..unitId
  export:
    - get_unitId


  validate:

#    - eq: [ $..retCode,'000000' ]
    - eq: [ $..unitId, '${get_unitId}']

