config:
  name: 在线_v6

  variables:
    user: ten_api@zhichi.com
    passowrd: QGxpdXloMTIz
    # key: 8ac16623-d031-41ac-9208-94fcc0ac3a80

teststeps:
-
  name: 在线_v6_登录
  request:
    method: POST
    url: /text/basic-login/account/consoleLogin/4
    json:
      loginUser: ${user}
      loginPwd: ${passowrd}
      # randomKey: ${key}
      loginFlag: 1
      terminalCode: 02
    headers:
      Content-Type: application/json

  extract:
    get_temp_id: $..item # 就是登录的token

  export:
    - get_temp_id
  validate:
    - eq: [status_code, 200]


