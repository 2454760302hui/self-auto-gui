-
  name: 开启留言-自有渠道设置，方式为留言转离线，留言内容为整体
  request:
    method: post
    headers:
      temp-id: ${get_temp_id}
    url: /text/chat-set/chat/config/updateRestLeaveMsgConfigById/4

    data:
      configId:  903e189ab6ab4155b911984198743780 #固定值
      leaveToOfflineConfigId: ${get_leave_id}
      msgFlag: 0
      msgToTicketFlag: 2
      leaveType: 0
      msgLeaveTxt: ${fake.text(max_nb_chars=100)} #说明是1000字符，有bug已提
      msgLeaveContentTxt: ${fake.text(max_nb_chars=100)}
