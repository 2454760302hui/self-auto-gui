config:
  name: 在线_v6

teststeps:

-
  name: 客服工作台-自动应答设置-微博-随机内容
  request:
    method: POST
    url: /text/chat-kwb/admin/modifyAdminChannelConfig.action
    data:
      channelType: 3
      adminHelloWord: ${fake.text()}
      serviceOutDoc: #${fake.text()}
      serviceEndPushMsg: #${fake.text()}
      serviceOutTime: 1
      tid: xOh8P5f7pLDPHW5kyWJscuzHfKg8v3Wj5TWF2jP6WShHF5Q1r9A2GCXYF8Kk/xLt
  validate:
    - eq: [ $..status,1 ]

-
  name: 客服工作台-自动应答设置-微博-内容为空
  request:
    method: POST
    url: /text/chat-kwb/admin/modifyAdminChannelConfig.action
    data:
      channelType: 3
      adminHelloWord: ''
      serviceOutDoc: ''
      serviceEndPushMsg: ''
      serviceOutTime: 1
      tid: H1hz6lTjZ2u7SGkPrC88N67X0o6hPSKwPvoa4Nb30rI0hoH5dRpzbj5xDqLMnE5v
  validate:
    - eq: [ $..status,1 ]
