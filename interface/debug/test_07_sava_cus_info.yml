    data:
      customerFields: ''
      sender: xOh8P5f7pLDPHW5kyWJscuzHfKg8v3Wj5TWF2jP6WShMHmTtx1xy8fkF0qmbU+MR
      uid: ${get_uid}
      userId: ''
      #添加多个手机号 10个
      tel: '[{"encrypt":"${fake.phone_number()}","desensitization":"${fake.phone_number()}","unDesensitization":"${fake.phone_number()}"},
            {"encrypt":"${fake.phone_number()}","desensitization":"${fake.phone_number()}","unDesensitization":"${fake.phone_number()}"},
             {"encrypt":"${fake.phone_number()}","desensitization":"${fake.phone_number()}","unDesensitization":"${fake.phone_number()}"},
              {"encrypt":"${fake.phone_number()}","desensitization":"${fake.phone_number()}","unDesensitization":"${fake.phone_number()}"},
               {"encrypt":"${fake.phone_number()}","desensitization":"${fake.phone_number()}","unDesensitization":"${fake.phone_number()}"},
                {"encrypt":"${fake.phone_number()}","desensitization":"${fake.phone_number()}","unDesensitization":"${fake.phone_number()}"},
                 {"encrypt":"${fake.phone_number()}","desensitization":"${fake.phone_number()}","unDesensitization":"${fake.phone_number()}"},
                  {"encrypt":"${fake.phone_number()}","desensitization":"${fake.phone_number()}","unDesensitization":"${fake.phone_number()}"},
                   {"encrypt":"${fake.phone_number()}","desensitization":"${fake.phone_number()}","unDesensitization":"${fake.phone_number()}"},
                    {"encrypt":"${fake.phone_number()}","desensitization":"${fake.phone_number()}","unDesensitization":"${fake.phone_number()}"}
      
      
      
      ]'
