teststeps:
-
  name: 获取渠道id
  request:
    method: get
    headers:
      temp-id: ${get_temp_id}
    url: /text/chat-set/rest/selectConfigInfo/4?channelType=0
  extract:
    get_desk_configId: $.list.0.configId
    get_desk_configId_name: $.list.0.channelName
    get_desk_id: $.list.0.id
 

  export:
    - get_desk_configId_name
    - get_desk_configId
    - get_desk_id


