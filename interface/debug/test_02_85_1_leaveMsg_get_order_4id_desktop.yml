teststeps:
-
  name: 获取4位留言id-桌面渠道
  request:
    method: get
    headers:
      temp-id: ${get_temp_id}
    url: /text/chat-set/chat/config/getLeaveMsgToTicketConfig/4?leaveType=1&channelType=0&channelFlag=1

    data:
      leaveType: '1'
      channelType: '0'
      channelFlag: '1'
  extract:
    get_4order_id_desktop: $..id
  export:
    - get_4order_id_desktop

  validate:

    - eq: [ $..retCode,'000000' ]
#    - eq: [$..id,'${get_4order_id_desktop}' ]




