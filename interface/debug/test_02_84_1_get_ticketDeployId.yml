config:
  name: 在线_v6
#  parameters: #卡迪尔 参数
#    x: "${get_ksid}"


teststeps:
-
  name: 获取ticketDeployId
  request:
    method: get
    headers:
      temp-id: ${get_temp_id}
    url: /text/chat-set/chat/config/getLeaveMsgToTicketConfig/4?leaveType=0

    data:
      leaveType: 0
  extract:
    get_ticketDeployId_id: $..ticketDeployId
  export:
    - get_ticketDeployId_id

  validate:

    - eq: [ $..retCode,'000000' ]
    - eq: [ $..ticketDeployId,'${get_ticketDeployId_id}']


