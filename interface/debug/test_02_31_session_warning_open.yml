  request:
    method: POST
    headers:
      temp-id: ${get_temp_id}
    url: /text/chat-set/sessionWarning/updateSessionWarning/4

    data:
      firstRepsOutFlag: 1
      firstRepsOutTime: ${fake.random_int(1,100)}
