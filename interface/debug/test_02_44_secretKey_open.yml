teststeps:
-
  name: 密钥开启
  request:
    method: POST
    headers:
      temp-id: ${get_temp_id}
    url: /text/basic-config-service/iframeSetting

    data:
      openFlag: 1
  extract:
    get_key: $..secretKey
  export:
    - get_key

  validate:
    - eq: [ $..retCode,'000000' ]
    - eq: [ $..secretKey,'${get_key}']
#    - eq: [ $..keyword, '${del_keyWord}']
