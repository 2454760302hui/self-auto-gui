teststeps:
-
  name: 获取【特需】渠道组id ，其中特需为测试数据-如有替换场景-需处理
  request:
    method: get
    headers:
      temp-id: ${get_temp_id}
    url: /text/chat-set/chat/config/getTicketToMsgConfig/4?leaveType=2&groupId=97070c0636b24501ac5bfa9fbe43a417

    data:
      leaveType: 2
      groupId: 67ff981a42bb4743ba6573687b9cc01f #特需
  extract:
    get_leave_special_needs_id: $..id
#    get_ticketDeployName: $..ticketDeployName
  export:
    - get_leave_special_needs_id
#    - get_ticketDeployName

  validate:

    - eq: [ $..retCode,'000000' ]
    - eq: [$..id,'${get_leave_special_needs_id}' ]
