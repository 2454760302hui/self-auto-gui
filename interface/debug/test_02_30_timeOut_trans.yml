teststeps:
-
  name: 客服分配设置-超时转接-开启
#  skip: 跑完接口-再次查看超时转接-系统异常
  request:
    method: POST
    headers:
      temp-id: ${get_temp_id}
    url: /text/chat-set/outReception/update/4

    data:
      configId: ${get_configId}
      openFlag: 1
      allGroup: 1
      groupId: 67ff981a42bb4743ba6573687b9cc01f,719596005bda4ce7b228461468ee4883
      outTime: 1
      transferType: 1
      transferId: ${get_updateServiceId}
      transferId1: ${get_updateServiceId}
      transferId2: 
      triggerMode: 1
      transferFre: 1


  validate:
    - eq: [ $..retCode,'000000' ]
#    - eq: [ $..keyword, '${del_keyWord}']
#  deciId": "83d4039186d8452b88a59873bfcf2084 == 客服列表 对应的是serviceId=客服列表


-
  name: 客服分配设置-超时转接-关闭-ing
#  skip: 跑完接口-再次查看超时转接-系统异常
  request:
    method: POST
    headers:
      temp-id: ${get_temp_id}
    url: /text/chat-set/outReception/update/4

    data:
      configId: ${get_configId}
      openFlag: 1
      allGroup: 1
      groupId: 67ff981a42bb4743ba6573687b9cc01f,719596005bda4ce7b228461468ee4883
      outTime: 1
      transferType: 1
      transferId: ${get_updateServiceId}
      transferId1: ${get_updateServiceId}
      transferId2: 
      triggerMode: 1
      transferFre: 1


  validate:
    - eq: [ $..retCode,'000000' ]
#    - eq: [ $..keyword, '${del_keyWord}']
