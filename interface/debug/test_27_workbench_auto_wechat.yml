config:
  name: 在线_v6

teststeps:

-
  name: 客服工作台-自动应答设置-微信-随机内容
  request:
    method: POST
    url: /text/chat-kwb/admin/modifyAdminChannelConfig.action
    data:
      channelType: 1
      adminHelloWord: ${fake.text()}
      serviceOutDoc: #${fake.text()}
      serviceEndPushMsg: #${fake.text()}
      serviceOutTime: 1
      tid: H1hz6lTjZ2u7SGkPrC88N67X0o6hPSKwPvoa4Nb30rJfCGna2OBTkqIsxc1B13Nn
  validate:
    - eq: [ $..status,1 ]


-
  name: 客服工作台-自动应答设置-微信-内容为空
  request:
    method: POST
    url: /text/chat-kwb/admin/modifyAdminChannelConfig.action
    data:
      channelType: 1
      adminHelloWord: ''
      serviceOutDoc: ''
      serviceEndPushMsg: ''
      serviceOutTime: 1
      tid: H1hz6lTjZ2u7SGkPrC88N67X0o6hPSKwPvoa4Nb30rJfCGna2OBTkqIsxc1B13Nn
  validate:
    - eq: [ $..status,1 ]