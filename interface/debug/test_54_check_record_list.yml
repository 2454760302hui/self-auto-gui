config:
  name: 在线_v6

teststeps:

-
  name: 完结会话-查看会话记录列表-（会话列表返回的是第二条）
  request:
    method: POST
    url: /text/chat-statistics/sessionRecordMsg/querySessionListVer2
    headers:
      temp-id: ${get_temp_id}
    json:
      aiClassificationStates: null
      page: 1
      size: 15
      searchWay: 2
      allViewFlag:
      startDateTs: ${current_time_0()}  #1699459200000  #需动态生成时间戳-demo-11月8
      endDateTs: ${current_finaly_time()} #1699545540000
      departIdsParam:
      recordCustomScreen: uname
      recordCustomScreenValue:
      area:
      urlSearchValue:
      urlSearchKey: landPagePreUrl
      hitKeyword:
      recordSessionDuration: gte
      recordSessionDurationValue: 0
      recordSessionAvgDuration: gte
      recordSessionAvgDurationValue: 0
      recordSessionFirstDuration: gte
      recordSessionFirstDurationValue: 0
      recordChatScreen: content
      recordChatScreenValue:
      groupSearchKey: lastGroupId
      groupSearchValue:
      staffSearchKey: lastStaffId
      staffSearchValue:
      cid:
      solvedOneTime24H:
      robotEffectiveness:
      effectiveness:
      sessionHumanTransfer:
      queueStatus:
      revokeFlag:
      robotReceptionFlag:
      offlineType:
      summaryFlag: 0
      questionStatus:
      invalidSession:
      operationId:
      reqType:
      summaryFieldValue:
      summaryFieldId:
      summaryClassifyCodes:
      summaryHandleProgresses:
      summaryTemplateIds:
      summaryRemark:
      isEvaluated:
      isResovled:
      resetFlag: 0
      scoreFlag:
      score:
      npsScore:
      isRobotEvaluated:
      isRobotResovled:


  extract:
    get_uname: $.item.0.uname
    get_realname: $.item.0.realname
    get_cid: $.item.0.cid
    get_total: $..totalCount
    get_lastStaffId: $.item.0.lastStaffId #客服id
  export:
    - get_uname
    - get_realname
    - get_cid
    - get_total
    - get_lastStaffId

  validate:
#    - eq: [$..status,1]
    - eq: [$..retCode, "000000" ]

