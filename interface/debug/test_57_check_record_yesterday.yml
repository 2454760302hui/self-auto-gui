      isRobotEvaluated:
      isRobotResovled:


  extract:
#    get_uname: $.item.0.uname
#    get_realname: $.item.0.realname
#    get_cid: $.item.0.cid
    get_total: $..totalCount
  export:
#    - get_uname
#    - get_realname
#    - get_cid
    - get_total
  print: ${get_total}

  validate:
#    - eq: [$..status,1]
    - eq: [$..retCode, "000000" ]
    - eq: [$..totalCount, "${get_total}"]


