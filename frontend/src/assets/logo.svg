<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#bgGrad)" stroke-width="2" opacity="0.3"/>
  <!-- Inner hexagon background -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18" fill="url(#bgGrad)" opacity="0.15"/>
  <!-- Center N letter -->
  <text x="32" y="44" font-family="'Segoe UI', Arial, sans-serif" font-size="30" font-weight="bold" fill="url(#bgGrad)" text-anchor="middle" dominant-baseline="middle">N</text>
  <!-- Orbit dots -->
  <circle cx="32" cy="8" r="2.5" fill="#7c3aed"/>
  <circle cx="54" cy="32" r="2.5" fill="#06b6d4"/>
  <circle cx="32" cy="56" r="2.5" fill="#7c3aed"/>
  <circle cx="10" cy="32" r="2.5" fill="#06b6d4"/>
  <!-- Connecting lines -->
  <line x1="32" y1="8" x2="54" y2="32" stroke="url(#bgGrad)" stroke-width="1" opacity="0.4"/>
  <line x1="54" y1="32" x2="32" y2="56" stroke="url(#bgGrad)" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="56" x2="10" y2="32" stroke="url(#bgGrad)" stroke-width="1" opacity="0.4"/>
  <line x1="10" y1="32" x2="32" y2="8" stroke="url(#bgGrad)" stroke-width="1" opacity="0.4"/>
</svg>
